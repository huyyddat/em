<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Bé Yêu 8/3</title>
    <style>
        :root {
            --rose-color: #e91e63;
            --stem-color: #4caf50;
            --glass-bg: rgba(255, 255, 255, 0.12);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* SVG Rose Styling */
        svg {
            width: 90%;
            max-width: 450px;
            height: auto;
            z-index: 2;
        }

        path {
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
        }

        /* 1. Thân xuất hiện (0-3s) */
        .stem {
            stroke: var(--stem-color);
            animation: draw 3s linear forwards;
        }

        /* 2. Lá xuất hiện (3-5s) */
        .leaf {
            stroke: var(--stem-color);
            animation: draw 2s linear 3s forwards;
        }

        /* 3. Hoa xuất hiện (5-10s) */
        .petal {
            stroke: var(--rose-color);
            animation: draw 5s ease-in-out 5s forwards;
        }
        
        .petal-fill {
            fill: var(--rose-color);
            opacity: 0;
            animation: fillFade 3s ease-in 8s forwards;
        }

        @keyframes draw {
            to { stroke-dashoffset: 0; }
        }

        @keyframes fillFade {
            to { opacity: 0.2; }
        }

        /* Hệ thống tin nhắn rơi dày đặc */
        #message-rain {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .bubble {
            position: absolute;
            top: -100px;
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 8px 15px;
            color: #fff;
            font-size: 0.9rem;
            white-space: nowrap;
            box-shadow: 0 4px 15px rgba(233, 30, 99, 0.2);
            animation: fall linear forwards;
        }

        @keyframes fall {
            0% { transform: translateY(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(115vh); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <svg viewBox="0 0 100 120">
            <path class="stem" d="M50,115 Q48,80 50,45" />
            
            <path class="leaf" d="M49,90 Q30,85 35,70 Q45,70 49,90" />
            <path class="leaf" d="M51,75 Q70,70 65,55 Q55,55 51,75" />

            <g>
                <path class="petal" d="M50,45 Q35,40 30,25 Q50,5 70,25 Q65,40 50,45" />
                <path class="petal" d="M50,45 Q70,40 80,25 Q70,10 50,15" />
                <path class="petal" d="M50,45 Q30,40 20,25 Q30,10 50,15" />
                <path class="petal" d="M50,30 Q45,20 50,10 Q55,20 50,30" />
                <path class="petal-fill" d="M50,45 Q35,40 30,25 Q50,5 70,25 Q65,40 50,45 Z" />
            </g>
        </svg>

        <div id="message-rain"></div>
    </div>

    <script>
        const messages = [
            "Anh yêu em ❤️",
            "Yêu em bé của anh 🌹",
            "Nhớ em bé yêu của anh rất nhìu",
            "8/3 hạnh phúc nhen",
            "Em bé của anh cười đẹp lắm 😊",
            "Cười nhiều lên nhe em bé",
            "Bên nhau quài quài nhe",
            "Love you 3000"
        ];

        const container = document.getElementById('message-rain');

        function createMessage() {
            const text = messages[Math.floor(Math.random() * messages.length)];
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.innerText = text;

            // Vị trí ngang ngẫu nhiên (10% - 85%)
            bubble.style.left = (Math.random() * 75 + 5) + '%';
            
            // Tốc độ rơi: từ 5s đến 8s (vừa phải để kịp đọc)
            const duration = 5 + Math.random() * 3;
            bubble.style.animationDuration = duration + 's';

            container.appendChild(bubble);

            // Xóa bubble sau khi rơi xong
            setTimeout(() => { bubble.remove(); }, duration * 1000);
        }

        // Bắt đầu rơi tin nhắn sau khi hoa đã nở hoàn toàn (10 giây)
        setTimeout(() => {
            // "Dày đặc hơn" bằng cách tạo tin nhắn mỗi 0.8 giây
            setInterval(createMessage, 800);
        }, 10000);

        // Tạo 3 tin nhắn ngay lập tức khi bắt đầu giai đoạn tin nhắn để "mồi" cảm giác dày đặc
        setTimeout(() => {
            for(let i=0; i<3; i++) createMessage();
        }, 10001);
    </script>
</body>
</html>
