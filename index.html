<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dành Tặng Em ❤️</title>
    <style>
        /* Thiết lập giao diện chung */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffe6e9; /* Màu hồng phấn nhẹ */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        h1, h2 {
            color: #d81b60; /* Màu hồng đậm hơn cho chữ */
            text-align: center;
            margin-bottom: 20px;
        }

        /* KHU VỰC TRÒ CHƠI */
        #game-container {
            text-align: center;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 80px); /* 4 cột */
            gap: 10px;
            margin: 0 auto;
        }

        .card {
            width: 80px;
            height: 80px;
            background-color: white;
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        /* Khi thẻ được lật */
        .card.flipped {
            transform: rotateY(180deg);
        }

        /* Mặt trước và mặt sau của thẻ */
        .front, .back {
            width: 100%;
            height: 100%;
            position: absolute;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            border-radius: 10px;
        }

        .front {
            background-color: #f48fb1; /* Màu hồng cho mặt lưng thẻ */
            color: white;
            font-weight: bold;
        }

        .back {
            background-color: white;
            transform: rotateY(180deg);
            border: 2px solid #f48fb1;
        }

        /* KHU VỰC PHẦN THƯỞNG */
        #reward-container {
            display: none; /* Ẩn mặc định */
            flex-direction: column;
            align-items: center;
            animation: fadeIn 1s ease-in;
        }

        /* Hộp quà */
        .gift-box {
            font-size: 100px;
            cursor: pointer;
            animation: bounce 2s infinite;
            transition: transform 0.3s;
        }

        .gift-box:hover {
            transform: scale(1.1);
        }

        /* Tin nhắn bí mật */
        .secret-message {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: white;
            border-radius: 15px;
            border: 2px dashed #d81b60;
            color: #d81b60;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            max-width: 90%;
            box-shadow: 0 4px 15px rgba(216, 27, 96, 0.2);
            animation: popUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Hiệu ứng động (Animations) */
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-20px);}
            60% {transform: translateY(-10px);}
        }

        @keyframes fadeIn {
            from {opacity: 0;} to {opacity: 1;}
        }

        @keyframes popUp {
            from {transform: scale(0.5); opacity: 0;}
            to {transform: scale(1); opacity: 1;}
        }

        /* Responsive cho điện thoại */
        @media (max-width: 400px) {
            .grid {
                grid-template-columns: repeat(4, 70px);
                gap: 5px;
            }
            .card {
                width: 70px;
                height: 70px;
            }
        }
    </style>
</head>
<body>

    <!-- Màn hình trò chơi -->
    <div id="game-container">
        <h1>Game nhỏ tặng em bé❤️</h1>
        <div class="grid" id="grid">
            <!-- Thẻ bài sẽ được tạo bởi Javascript -->
        </div>
        <p style="color: #880e4f; margin-top: 10px;">(Tìm mấy cặp hình giống nhau nheee bé)</p>
    </div>

    <!-- Màn hình phần thưởng -->
    <div id="reward-container">
        <h2>Dỏiiiii quá cục dàng ơi! 🥰</h2>
        <p>Phần thưởng dành cho em nè:</p>
        
        <div class="gift-box" onclick="openGift()">
            🎁
        </div>

        <div class="secret-message" id="message">
            Ngày mai em cho anh rước em đi học nha ❤️
        </div>
    </div>

    <script>
        // Cấu hình trò chơi
        // Sử dụng icon dễ thương
        const icons = ['🐱', '🐱', '🐰', '🐰', '🍓', '🍓', '🎀', '🎀', '🧸', '🧸', '💖', '💖'];
        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        const totalPairs = icons.length / 2;
        const grid = document.getElementById('grid');
        const gameContainer = document.getElementById('game-container');
        const rewardContainer = document.getElementById('reward-container');
        const messageBox = document.getElementById('message');
        const giftBox = document.querySelector('.gift-box');

        // Hàm trộn mảng ngẫu nhiên
        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        // Khởi tạo trò chơi
        function initGame() {
            const shuffledIcons = shuffle(icons);
            
            shuffledIcons.forEach(icon => {
                const card = document.createElement('div');
                card.classList.add('card');
                
                // Tạo mặt trước (dấu hỏi) và mặt sau (icon)
                card.innerHTML = `
                    <div class="front">?</div>
                    <div class="back">${icon}</div>
                `;
                
                card.dataset.icon = icon; // Lưu icon vào data để so sánh
                card.addEventListener('click', flipCard);
                grid.appendChild(card);
            });
        }

        // Xử lý khi lật thẻ
        function flipCard() {
            // Không cho lật nếu đang so sánh 2 thẻ hoặc thẻ đã lật rồi
            if (flippedCards.length < 2 && !this.classList.contains('flipped')) {
                this.classList.add('flipped');
                flippedCards.push(this);

                if (flippedCards.length === 2) {
                    checkForMatch();
                }
            }
        }

        // Kiểm tra xem 2 thẻ có giống nhau không
        function checkForMatch() {
            const [card1, card2] = flippedCards;
            const icon1 = card1.dataset.icon;
            const icon2 = card2.dataset.icon;

            if (icon1 === icon2) {
                // Nếu giống nhau
                matchedPairs++;
                flippedCards = [];
                
                // Kiểm tra điều kiện thắng
                if (matchedPairs === totalPairs) {
                    setTimeout(showReward, 800);
                }
            } else {
                // Nếu khác nhau, úp lại sau 1 giây
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    flippedCards = [];
                }, 1000);
            }
        }

        // Hiển thị màn hình phần thưởng
        function showReward() {
            gameContainer.style.display = 'none';
            rewardContainer.style.display = 'flex';
        }

        // Mở quà
        function openGift() {
            // Thay đổi icon hộp quà thành pháo giấy
            giftBox.innerHTML = '🎊';
            giftBox.style.animation = 'none'; // Dừng nhảy
            giftBox.style.transform = 'scale(1.2)';
            
            // Hiện tin nhắn
            messageBox.style.display = 'block';
        }

        // Bắt đầu game khi tải trang
        initGame();
    </script>
</body>
</html>
