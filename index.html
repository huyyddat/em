<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chúc mừng 8/3 Công Chúa</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #050005; /* Nền tối để hạt ánh sáng nổi bật */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Khung tin nhắn trôi xuống */
        #message-box {
            position: absolute;
            top: -100%;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 10;
            transition: top 2s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .bubble {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            color: white;
            padding: 12px 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(255, 105, 180, 0.3);
            opacity: 0;
            transform: translateY(-20px);
            animation: fadeIn 0.8s forwards;
            align-self: flex-start;
        }

        .bubble:nth-child(even) {
            align-self: flex-end;
            background: rgba(255, 182, 193, 0.25);
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        canvas {
            display: block;
        }
    </style>
</head>
<body>

    <div id="canvas-container">
        <canvas id="roseCanvas"></canvas>
    </div>

    <div id="message-box">
        </div>

    <script>
        const canvas = document.getElementById('roseCanvas');
        const ctx = canvas.getContext('2d');
        const messageBox = document.getElementById('message-box');

        let width, height;
        const particles = [];
        const messages = [
            "Anh yêu em ❤️",
            "Yêu em bé của anh 🌹",
            "Nhớ em bé yêu của anh rất nhìu",
            "8/3 hạnh phúc nhé!",
            "Em bé của anh cười đẹp lắm 😊",
            "Cười nhiều lên nhe em bé"
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y, color, targetX, targetY, delay) {
                this.x = x;
                this.y = height + 50;
                this.targetX = targetX;
                this.targetY = targetY;
                this.color = color;
                this.size = Math.random() * 2 + 1;
                this.speed = 0.02;
                this.alpha = 0;
                this.delay = delay;
                this.startTime = Date.now() + delay;
            }

            update() {
                if (Date.now() < this.startTime) return;
                
                this.x += (this.targetX - this.x) * this.speed;
                this.y += (this.targetY - this.y) * this.speed;
                if (this.alpha < 1) this.alpha += 0.01;
            }

            draw() {
                if (Date.now() < this.startTime) return;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color.replace('opacity', this.alpha);
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color.replace('opacity', '1');
                ctx.fill();
            }
        }

        // Tạo hình dáng hoa hồng
        function createRose() {
            const centerX = width / 2;
            const centerY = height * 0.6;
            const scale = Math.min(width, height) * 0.005;

            // 1. Thân cây (Mọc trong 0-8s)
            for (let i = 0; i < 100; i++) {
                const tx = centerX + Math.sin(i * 0.1) * 5;
                const ty = height - (i * (height * 0.5) / 100);
                particles.push(new Particle(centerX, height, 'rgba(34, 139, 34, opacity)', tx, ty, i * 60));
            }

            // 2. Lá (Mọc trong 8-13s)
            const leafPositions = [{x: -30, y: -100}, {x: 30, y: -150}];
            leafPositions.forEach((pos, idx) => {
                for (let i = 0; i < 50; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const r = Math.random() * 20 * scale;
                    const tx = centerX + pos.x + Math.cos(angle) * r;
                    const ty = height * 0.7 + pos.y + Math.sin(angle) * r;
                    particles.push(new Particle(centerX, height, 'rgba(50, 205, 50, opacity)', tx, ty, 8000 + (idx * 1000) + (i * 40)));
                }
            });

            // 3. Hoa nở (Mọc trong 13-20s)
            for (let i = 0; i < 400; i++) {
                const angle = i * 0.2;
                const r = (scale * 5) * Math.sqrt(i);
                const tx = centerX + Math.cos(angle) * r;
                const ty = height * 0.35 + Math.sin(angle) * r;
                
                // Màu hồng dải gradient
                const pink = `rgba(255, ${Math.floor(Math.random() * 100 + 50)}, ${Math.floor(Math.random() * 150 + 100)}, opacity)`;
                particles.push(new Particle(centerX, height, pink, tx, ty, 13000 + (i * 15)));
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(5, 0, 5, 0.2)'; // Tạo hiệu ứng đuôi mờ
            ctx.fillRect(0, 0, width, height);

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        function showMessages() {
            messageBox.style.top = "50px";
            messages.forEach((text, i) => {
                setTimeout(() => {
                    const bubble = document.createElement('div');
                    bubble.className = 'bubble';
                    bubble.innerText = text;
                    messageBox.appendChild(bubble);
                }, i * 1500); // Mỗi tin nhắn cách nhau 1.5s
            });
        }

        // Bắt đầu
        createRose();
        animate();

        // Sau 20 giây thì hiện tin nhắn
        setTimeout(showMessages, 20000);

    </script>
</body>
</html>
